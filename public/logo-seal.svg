  <path d="M 146 300 C 200 288, 312 278, 376 284 C 381 284.5, 381 291, 376 291 C 312 286, 202 296, 148 308 C 143 309, 141 301, 146 300 Z" fill="#A98B66"/>
  <path d="M 318 288 C 340 291, 358 297, 372 305 C 375 307, 373 312, 370 310 C 355 303, 338 297, 317 294 Z" fill="#BFA37E"/>

