             C 197 154, 201 161, 207 166
             C 200 186, 197 214, 201 240
             C 203 256, 208 270, 214 280
             C 218 286, 227 285, 230 278
             C 238 258, 241 226, 237 196
             C 235 180, 231 168, 226 160
             C 234 156, 239 148, 239 138
